name: Deploy to GitHub Pages & Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]

# 只允许一个并发的部署，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # =============================================
  # 共用构建步骤（GitHub Pages + Release 都需要）
  # =============================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # --- artifact for GitHub Pages ---
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # --- zip artifact for Release ---
      - name: Package release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd dist
          # 去掉 tag 前缀的 "v"，如 v1.2.3 → 1.2.3
          VERSION="${GITHUB_REF_NAME#v}"
          zip -r "../markdown-to-mindmap-${VERSION}.zip" .
          echo "PKG_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # 从 env 读取带版本号的 zip 包
          files: markdown-to-mindmap-${{ env.PKG_VERSION }}.zip
          # 自动生成 Release Body（变更摘要）
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================
  # 仅 main 分支推送 → 部署 GitHub Pages
  # =============================================
  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
