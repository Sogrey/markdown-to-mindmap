<pre class="language-markmap"><code class="language-markmap"># markmap

- beautiful
- useful
- easy
- interactive</code></pre>

<script src="./d3.min.js"></script>
<script src="./markmap-lib.js"></script>
<script src="./markmap-view.js"></script>

<script>
  const { Markmap, Transformer } = window.markmap;

  renderMarkmap()

  function renderMarkmap() {
    document
      .querySelectorAll("pre > code.language-markmap")
      .forEach((codeEl, index) => {
        const preEl = codeEl.closest("pre");
        const markdown = codeEl.textContent
          .replace(/<span[^>]*><\/span>/g, "")
          .trim();

        const svgEl = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg",
        );
        svgEl.id = `mindmap-${index}`;
        svgEl.style.cssText =
          "width: 100%; height: 400px; border: 1px solid #ccc; margin-top: 10px;";
        preEl.after(svgEl);
        preEl.style.display = "none";

        const transformer = new Transformer();
        const { root } = transformer.transform(markdown);
        Markmap.create(svgEl, {}, root);
      });
  }
</script>
